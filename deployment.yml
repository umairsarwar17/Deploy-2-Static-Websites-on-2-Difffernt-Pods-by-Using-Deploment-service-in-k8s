apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-app
  namespace: my-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html
  template:
    metadata:
      labels:
        app: html
    spec:
      containers:
      - name: html
        image: html-app1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
